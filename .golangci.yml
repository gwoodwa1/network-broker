version: "2"

run:
  timeout: 5m
  tests: true
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - dogsled
    - dupl
    - durationcheck
    - errcheck
    - errchkjson
    - errorlint
    - exhaustive
    - fatcontext
    - funlen
    - gocheckcompilerdirectives
    - gochecksumtype
    - gocognit
    - gocritic
    - gosec
    - govet
    - ineffassign
    - intrange
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - nilerr
    - nilnesserr
    - noctx
    - nolintlint
    - prealloc
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wastedassign
    - whitespace
  settings:
    cyclop:
      max-complexity: 30
      package-average: 15
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    exhaustive:
      default-signifies-exhaustive: true
    funlen:
      lines: 120
      statements: 60
    gocognit:
      min-complexity: 30
    gocritic:
      enable-all: true
      disabled-checks:
        - hugeParam
        - rangeValCopy
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    maintidx:
      under: 20
    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true
    revive:
      enable-all-rules: true
      rules:
        - name: add-constant
          disabled: true
        - name: argument-limit
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: confusing-naming
          disabled: true
        - name: confusing-results
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: exported
          disabled: true
        - name: function-length
          disabled: true
        - name: function-result-limit
          disabled: true
        - name: line-length-limit
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: package-comments
          disabled: true
        - name: unnecessary-format
          disabled: true
        - name: unhandled-error
          disabled: true
        - name: use-errors-new
          disabled: true
        - name: use-slices-sort
          disabled: true

  exclusions:
    generated: strict
    rules:
      - path: _test\.go
        linters:
          - dupl
          - funlen
          - maintidx

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      module-path: network_broker
      extra-rules: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  sort-order:
    - linter
    - file
