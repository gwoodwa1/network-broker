name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build, test, and vet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "The following files require gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check module tidiness
        run: go mod tidy -diff

      - name: Verify module content
        run: go mod verify

      - name: Build all packages
        run: go build -trimpath ./...

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -count=1 ./...

  lint:
    name: Strict lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  postgres-integration:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: broker
          POSTGRES_USER: broker
          POSTGRES_PASSWORD: broker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U broker -d broker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_TEST_DSN: postgres://broker:broker@localhost:5432/broker?sslmode=disable
      NATS_TEST_URL: nats://localhost:4222
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Start NATS JetStream
        run: |
          docker run --detach --name nats-jetstream --publish 4222:4222 nats:2.14.2-alpine --jetstream
          for attempt in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/4222) 2>/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs nats-jetstream
          exit 1

      - name: Run PostgreSQL and JetStream integration tests
        run: go test -race -count=1 -tags=integration ./test/integration

  security:
    name: Security analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check reachable Go vulnerabilities
        uses: golang/govulncheck-action@v1
        with:
          repo-checkout: false
          go-version-file: go.mod
          go-package: ./...
          cache: false

      - name: Run gosec
        uses: securego/gosec@v2.28.0
        with:
          args: ./cmd/... ./internal/... ./migrations

  containers:
    name: Build runtime containers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build collector image
        run: docker build --target collector --tag network-broker-collector:ci .

      - name: Build control-plane image
        run: docker build --target controlplane --tag network-broker-controlplane:ci .
